{% extends "base.html" %}
{% block title %}AI 문서 생성 · 지식 허브{% endblock %}
{% block body %}
<div class="layout">
  <div class="content">
    <h1>AI 문서 생성</h1>
    <p class="muted">소스를 주면 AI가 템플릿 골격을 채운 <strong>초안</strong>을 만듭니다.
      초안은 저장되지 않으며, 편집 화면에서 검토·수정 후 저장(save 게이트)해야 합니다.</p>

    {% if error %}
    <div class="banner banner-danger">{{ error }}</div>
    {% endif %}

    <form method="post" action="/ui/generate">
      <p><label>목표 타입</label><br>
        <select class="field" name="target_type">
          <option value="adr">adr</option>
          <option value="design-intent">design-intent</option>
          <option value="guide">guide</option>
        </select></p>

      <p><label>제목/지시 힌트 (선택)</label><br>
        <input class="field" type="text" name="hint" value="{{ hint or '' }}"
          placeholder="예: 인증 방식 결정을 ADR로"></p>

      <p><label>소스 문서 id (선택, 쉼표 구분)</label><br>
        <input class="field" type="text" name="source_ids" value="{{ source_ids or '' }}"
          placeholder="예: adr-0003, note-0001"></p>

      <p><label>소스 원문 (붙여넣기 · 대화 요약 등)</label><br>
        <textarea class="field mono" name="source_text" rows="12"
          spellcheck="false">{{ source_text or '' }}</textarea></p>

      <div style="margin-top: var(--space-3)">
        <button class="btn btn-primary" type="submit">초안 생성</button>
        <a class="btn" href="/">취소</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
