{% extends "base.html" %}
{% block title %}AI 채팅 · 지식 허브{% endblock %}
{% block body %}
<div class="layout">
  <div class="content">
    <h1>AI와 대화하며 문서 만들기</h1>
    <p class="muted">AI가 기존 지식을 <strong>검색·조회</strong>(펑션콜)하며 초안을 다듬고,
      답변은 <strong>토큰 스트리밍</strong>으로 표시됩니다. 마지막에 <strong>적용</strong>하면
      변경 제안(추가·수정·폐기)이 <strong>승인 대기 큐</strong>로 제출되고 관리자 승인을 거쳐 반영됩니다.</p>

    <noscript><div class="banner banner-warning">이 채팅은 스트리밍을 위해 JavaScript가 필요합니다.
      JS 없이 초안을 만들려면 <a href="/ui/generate">AI 생성</a> 또는 <a href="/ui/new">새 문서</a>를 이용하세요.</div></noscript>

    <div id="chat"
         data-stream-url="/chat/stream"
         data-apply-url="/chat/apply"
         data-approvals-url="/ui/approvals"
         data-project="{{ chat_project }}">
      <div id="messages" class="messages"></div>
      <div id="staged"></div>
      <form id="chatForm" autocomplete="off">
        <input type="hidden" id="sessionId" value="">
        <p class="muted">작성자: <strong>{{ principal.username }}</strong> (로그인 세션 기준)</p>
        <p><label>목표 타입</label><br>
          <select class="field" id="targetType" name="target_type">
            {% for t in ['adr', 'design-intent', 'guide'] %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
          </select></p>
        <p><label>메시지</label><br>
          <textarea class="field" id="message" name="message" rows="3" spellcheck="false"
            placeholder="예: 인증 방식 결정을 ADR로 정리해줘. 기존 결정과 겹치지 않게."></textarea></p>
        <button class="btn btn-primary" type="submit" id="sendBtn">보내기</button>
      </form>
    </div>
  </div>
</div>
<script src="/static/js/chat.js" defer></script>
{% endblock %}
