# 지식 허브 배포 — postgres + 관리 서버(web/UI) + MCP 서버(streamable-http).
# 모든 상태는 PostgreSQL 에(storage.backend=postgres). 문서·이력·스냅샷·제출·FTS 중앙관리.
#
#   docker compose up --build
#   # 최초 1회 기존 knowledge/ 이관:
#   docker compose run --rm admin python scripts/import_to_postgres.py

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hub
      POSTGRES_PASSWORD: ${PGPASSWORD:-hubpw}
      POSTGRES_DB: knowledge_hub
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hub -d knowledge_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin:  # 관리 서버 — HTTP API + 웹 UI(읽기·쓰기·승인)
    build: .
    command: python -m hub.interfaces.web
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      PGPASSWORD: ${PGPASSWORD:-hubpw}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KNOWLEDGE_HUB_CONFIG: /app/config.deploy.toml
      KNOWLEDGE_HUB_ROOT: /app/knowledge   # import 스크립트의 파일 소스(이관 원천)
    volumes:
      - ./config.deploy.toml:/app/config.deploy.toml:ro
      - ./knowledge:/app/knowledge:ro      # 기존 파일 저장소 → import_to_postgres 소스
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  mcp:  # MCP 서버 — streamable-http (원격 에이전트 접근)
    build: .
    command: python -m hub.interfaces.mcp_server
    environment:
      KNOWLEDGE_HUB_MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8001"
      PGPASSWORD: ${PGPASSWORD:-hubpw}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KNOWLEDGE_HUB_CONFIG: /app/config.deploy.toml
    volumes:
      - ./config.deploy.toml:/app/config.deploy.toml:ro
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
