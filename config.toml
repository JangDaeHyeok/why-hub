# 이 저장소(why-hub) 자체를 운영하는 실제 설정 (도그푸딩).
# 엔트리포인트(hub.interfaces.{web,http_api,mcp_server})가 KNOWLEDGE_HUB_CONFIG env 또는
# 작업 디렉토리의 ./config.toml 을 자동 로드한다.

repo_root = "knowledge"
lock_timeout = 10.0

# 미지정 project 문서(기존 ADR·대기 제출)가 속하는 기본 프로젝트.
default_project = "why-hub"

[id_patterns]
adr = "^adr-[0-9]{4}$"
design-intent = "^di-[a-z0-9-]+$"

# LLM 엔드포인트 (curate·요약·AI 생성·멀티턴 채팅). Anthropic 스타일 · 스트리밍/논스트리밍 2종.
# 엔드포인트 URL 은 인증 없는 공개 URL(=시크릿성)이라 git 에 커밋하지 않는다 — 환경변수로 주입:
#   export KNOWLEDGE_HUB_LLM_COMPLETE_URL=...   (논스트리밍)
#   export KNOWLEDGE_HUB_LLM_STREAM_URL=...     (스트리밍)
# 미설정 시 AI 관련 기능만 자동 graceful skip. effort/max_tokens 는 비시크릿 튜닝값이라 여기 둔다.
[llm]
effort = "high"   # low | high (엔드포인트 default high)
max_tokens = 4096

# 관리자 승인 워크플로우. enabled=true 면 모든 쓰기가 승인 대기 큐를 거친다.
# 승인 권한은 users.is_admin(DB)로 지정한다 — config 문자열 admins 는 제거됨(인증/RBAC).
[approval]
enabled = true

# 인증/인가. 로컬 도그푸딩은 off(무마찰). 켜려면 AUTH_ENABLED=true + 키/시크릿 주입(README 참고).
[auth]
enabled = false
