# 배포용 설정 (docker-compose 가 마운트). 모든 상태를 PostgreSQL 에.
# 비밀번호는 PGPASSWORD env 로 주입. LLM 엔드포인트는 공개 URL — 별도 키 불필요.

default_project = "why-hub"

[id_patterns]
adr = "^adr-[0-9]{4}$"
design-intent = "^di-[a-z0-9-]+$"

[storage]
backend = "postgres"
[storage.postgres]
# 접속은 compose 가 KNOWLEDGE_HUB_PG_DSN env 로 주입한다(admin=hub_admin, mcp=hub_mcp 롤 분리).
# 아래 값은 env 미주입 시 폴백.
host = "postgres"        # compose 서비스명
port = 5432
database = "knowledge_hub"
user = "hub"
password_env = "PGPASSWORD"

# 엔드포인트 URL 은 compose 가 env(KNOWLEDGE_HUB_LLM_COMPLETE_URL / _STREAM_URL)로 주입한다 — .env 참고.
[llm]
effort = "high"   # low | high
max_tokens = 4096

[approval]
enabled = true
# 관리자는 users.is_admin(DB)로 지정 — config 문자열 목록은 더 이상 쓰지 않는다(인증/RBAC).

# 인증/인가 (구현스펙-인증인가-RBAC.md). 비시크릿 설정만 여기, secret(키·pepper·session)은 env/파일.
# compose 가 AUTH_* env 로 덮어쓴다(배포 기본: enabled/secure/signup on).
[auth]
enabled = true
issuer = "why-hub"
mcp_audience = "why-hub-mcp"
access_token_ttl_seconds = 600      # JWT 기본 TTL 10분
cookie_secure = true
signup_enabled = true
private_key_file = "/run/secrets/jwt_private.pem"   # admin 만
public_key_file = "/run/secrets/jwt_public.pem"
