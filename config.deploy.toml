# 배포용 설정 (docker-compose 가 마운트). 모든 상태를 PostgreSQL 에.
# 비밀번호는 PGPASSWORD env 로 주입. LLM 엔드포인트는 공개 URL — 별도 키 불필요.

default_project = "why-hub"

[id_patterns]
adr = "^adr-[0-9]{4}$"
design-intent = "^di-[a-z0-9-]+$"

[storage]
backend = "postgres"
[storage.postgres]
host = "postgres"        # compose 서비스명
port = 5432
database = "knowledge_hub"
user = "hub"
password_env = "PGPASSWORD"

# 엔드포인트 URL 은 compose 가 env(KNOWLEDGE_HUB_LLM_COMPLETE_URL / _STREAM_URL)로 주입한다 — .env 참고.
[llm]
effort = "high"   # low | high
max_tokens = 4096

[approval]
enabled = true
admins = ["dhjang2"]
