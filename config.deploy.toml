# 배포용 설정 (docker-compose 가 마운트). 모든 상태를 PostgreSQL 에.
# 비밀번호는 PGPASSWORD env, OpenAI 키는 OPENAI_API_KEY env 로 주입.

default_project = "why-hub"

[id_patterns]
adr = "^adr-[0-9]{4}$"
design-intent = "^di-[a-z0-9-]+$"

[storage]
backend = "postgres"
[storage.postgres]
host = "postgres"        # compose 서비스명
port = 5432
database = "knowledge_hub"
user = "hub"
password_env = "PGPASSWORD"

[llm]
base_url = "https://api.openai.com/v1"
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"

[approval]
enabled = true
admins = ["dhjang2"]
