# 지식 허브 설정 예시 (hub.config.Config.load 로 로드).
# 모든 키는 선택 — 생략 시 hub/config.py 의 기본값을 쓴다.

repo_root = "knowledge"
lock_timeout = 10.0

# 멀티프로젝트: project 미지정 문서가 속하는 기본 프로젝트. 검색/목록은 ?project=... 로 스코프.
default_project = "why-hub"

# 저장 백엔드. backend="file"(기본·로컬/테스트: 파일+SQLite FTS5) | "postgres"(배포).
# postgres 는 문서·이력·스냅샷·제출·FTS 를 모두 PostgreSQL 에 둔다(트랜잭션 ACID). 비밀번호는 env(password_env).
[storage]
backend = "file"
[storage.postgres]
# dsn = "postgresql://hub:pw@localhost:5432/knowledge_hub"   # dsn 주면 아래 host/port 무시
host = "localhost"
port = 5432
database = "knowledge_hub"
user = "hub"
password_env = "PGPASSWORD"
# 스키마 DDL(CREATE/ALTER)을 이 프로세스가 실행할지. 소유 롤(hub_admin)=true, 검증 전용 롤(hub_mcp)은
# false(DDL 미실행·준비 대기). 배포에선 env KNOWLEDGE_HUB_PG_MANAGE_SCHEMA=false 로 mcp 만 끈다.
manage_schema = true

# 타입별 id 정규식 (기본: 모든 타입 "^[a-z]+-[0-9]{4}$")
# 주의: 정규식과 별개로 lint 가 경로 구분자('/', '\', '..')를 항상 거부한다(traversal 차단).
# 그래도 패턴 자체를 경로 안전 문자로 좁히는 것을 권장한다.
[id_patterns]
adr = "^adr-[0-9]{4}$"
design-intent = "^di-[a-z0-9-]+$"   # 예: di-2026-07-billing

# ADR 필수 섹션 별칭 (표준명 -> 허용 별칭). 비ASCII 키는 TOML 규칙상 따옴표로 감싼다.
[section_aliases]
"결과" = ["결과", "결과 및 영향", "영향"]

# LLM 엔드포인트 (curate·요약·AI 생성·멀티턴 채팅). Anthropic 스타일 · 스트리밍/논스트리밍 2종.
# 엔드포인트 URL 은 인증 없는 공개 URL(=시크릿성)이라 config 에 두지 않고 환경변수로 주입한다:
#   KNOWLEDGE_HUB_LLM_COMPLETE_URL / KNOWLEDGE_HUB_LLM_STREAM_URL  (예: .env — .env.example 참고)
# 미설정 시 AI 관련 기능만 자동 graceful skip. 네이티브 펑션콜은 없고 멀티턴 도구 루프는
# 프롬프트 shim(hub/llm.py)으로 흡수한다. effort/max_tokens 는 비시크릿 튜닝값이라 여기 둔다.
[llm]
effort = "high"   # low | high (엔드포인트 default high)
max_tokens = 4096

# 관리자 승인 워크플로우 (구현스펙-승인워크플로우.md).
# enabled=true 면 모든 쓰기(수동·AI 적용·ingest)가 승인 대기 큐를 거친다.
# 승인/반려는 knowledge:review scope(=users.is_admin) 보유자만 가능(과거 admins 문자열 목록은 제거).
[approval]
enabled = true

# 인증/인가 (구현스펙-인증인가-RBAC.md). 로컬 개발 기본은 비활성(enabled=false) — 무마찰.
# 배포는 enabled=true + secure cookie + 키/시크릿 주입. secret(private key·pepper·session secret)은
# 여기 두지 않고 env/파일로만 주입한다(아래는 이름·경로만):
#   AUTH_PAT_PEPPER, AUTH_SESSION_SECRET (env)  ·  private_key_file/public_key_file (파일)
# 키 생성:  openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out jwt_private.pem
#           openssl rsa -pubout -in jwt_private.pem -out jwt_public.pem
[auth]
enabled = false                 # 로컬 기본 off. 배포는 true(또는 AUTH_ENABLED=true).
issuer = "why-hub"
mcp_audience = "why-hub-mcp"
access_token_ttl_seconds = 600  # JWT 기본 TTL 10분(설정 가능)
session_ttl_seconds = 1209600   # 웹 세션 14일
cookie_secure = false           # 배포는 true (HTTPS)
signup_enabled = true
# private_key_file = "secrets/jwt_private.pem"   # admin 서버만
# public_key_file  = "secrets/jwt_public.pem"    # MCP 검증용 (또는 jwks_url)
# jwks_url = "http://admin:8000/.well-known/jwks.json"
pat_pepper_env = "AUTH_PAT_PEPPER"
session_secret_env = "AUTH_SESSION_SECRET"
# rate limit 임계값(슬라이딩 윈도우). 로그인은 계정 버킷 + 클라이언트(IP) 버킷을 함께 적용하고
# (사용자명 회전 우회 차단), 가입은 클라이언트 버킷으로 제한한다(사용자명 회전 CPU/저장 소모 차단).
# login_rate_window_seconds = 60
# login_max_per_account = 10
# login_max_per_client = 30
# signup_rate_window_seconds = 3600
# signup_max_per_client = 10
# exchange_rate_window_seconds = 60
# exchange_max_per_client = 20
